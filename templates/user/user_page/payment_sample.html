<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amina Grocery | Secure Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }
        body {
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .payment-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #2563eb;
            margin-bottom: 20px;
            display: block;
        }
        .price-container {
            margin: 25px 0;
            padding: 20px;
            background: #f1f5f9;
            border-radius: 12px;
        }
        .price-label {
            font-size: 0.9rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .amount {
            display: block;
            font-size: 2.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-top: 5px;
        }
        .btn-pay {
            width: 100%;
            padding: 14px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .btn-pay:hover {
            background-color: #1d4ed8;
        }
        .secure-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-top: 15px;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="payment-card">
        <span class="logo">Amina Grocery</span>
        
        <div class="price-container">
            <span class="price-label">Total Payable Amount</span>
            <span class="amount">₹{{ display_amount }}</span>
        </div>

        <button class="btn-pay" id="pay-btn">Pay Now</button>
        
        <div class="secure-text">
            <span>🔒 Secure Checkout via Razorpay</span>
        </div>
    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        var options = {
            "key": "{{ razorpay_merchant_key }}", 
            "amount": "{{ razorpay_amount }}", 
            "currency": "{{ currency }}",
            "name": "Amina Grocery",
            "description": "Order Payment",
            "order_id": "{{ razorpay_order_id }}", 
            "callback_url": "{{ callback_url }}",
            "theme": {
                "color": "#2563eb"
            }
        };
        
        var rzp1 = new Razorpay(options);
        document.getElementById('pay-btn').onclick = function(e){
            rzp1.open();
            e.preventDefault();
        }
    </script>
</body>
</html>
